<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Select Faculty Mentor</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body style="min-height: 100vh; display: flex; align-items: center; justify-content: center;">

<div class="glass-container" style="max-width: 500px; padding: 40px; text-align: center;">
    <h2 style="margin: 0 0 10px 0; color: #f8fafc;">Welcome to the Academic Portal</h2>
    <p style="color: #94a3b8; font-size: 0.95rem; margin-bottom: 30px;">Before you proceed, you must select your assigned Faculty Mentor. This links your academic performance tracking directly to their dashboard.</p>

    <form method="POST" action="/student/select_mentor" style="text-align: left;">
        <div class="form-group" style="margin-bottom: 30px;">
            <label>Select Faculty Mentor</label>
            <select name="mentor_id" required style="width: 100%; padding: 12px; background: rgba(15, 23, 42, 0.6); border: 1px solid rgba(255, 255, 255, 0.1); color: #f8fafc; border-radius: 8px;">
                <option value="" disabled selected>Select from dropdown...</option>
                {% for t in teachers %}
                    <option value="{{ t.teacher_id }}">{{ t.name }} ({{ t.department }})</option>
                {% endfor %}
            </select>
        </div>

        <button type="submit" class="btn" style="width: 100%; padding: 14px; font-size: 1rem;">Confirm Assignment</button>
    </form>
</div>

</body>
</html>
