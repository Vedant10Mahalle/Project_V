<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Update Academic Data</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="glass-container large" style="max-width: 800px;">
    <h2 style="margin: 0;">Update Student Metrics</h2>
    <p style="color: #94a3b8; font-size: 0.95rem; margin-bottom: 30px;">Entering data for Student ID: <strong style="color: #f8fafc;">{{ student_id }}</strong></p>

    <form method="POST" action="/teacher/update/{{ student_id }}">
        
        <h3 class="section-header" style="margin-top:0;">Subject Marks (Out of 100)</h3>
        <div class="form-grid">
            <div class="form-group"><label>Subject 1</label><input type="number" step="0.1" name="sub1" value="{{ record.sub1|default(0) }}" required></div>
            <div class="form-group"><label>Subject 2</label><input type="number" step="0.1" name="sub2" value="{{ record.sub2|default(0) }}" required></div>
            <div class="form-group"><label>Subject 3</label><input type="number" step="0.1" name="sub3" value="{{ record.sub3|default(0) }}" required></div>
            <div class="form-group"><label>Subject 4</label><input type="number" step="0.1" name="sub4" value="{{ record.sub4|default(0) }}" required></div>
            <div class="form-group"><label>Subject 5</label><input type="number" step="0.1" name="sub5" value="{{ record.sub5|default(0) }}" required></div>
            <div class="form-group"><label>Subject 6</label><input type="number" step="0.1" name="sub6" value="{{ record.sub6|default(0) }}" required></div>
        </div>

        <h3 class="section-header">Aggregated Metrics</h3>
        <div class="form-grid">
            <div class="form-group"><label>Overall Attendance (%)</label><input type="number" step="0.1" name="attendance" value="{{ record.attendance|default(0) }}" required></div>
            <div class="form-group"><label>Current Semester Marks</label><input type="number" step="0.1" name="semester_marks" value="{{ record.semester_marks|default(0) }}" required></div>
        </div>

        <div style="text-align: right; margin-top: 30px;">
            <a href="/teacher" class="btn secondary" style="margin-right: 15px;">Cancel</a>
            <button type="submit" class="btn">Save & Recalculate Risk</button>
        </div>
    </form>
</div>

</body>
</html>
