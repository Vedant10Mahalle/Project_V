<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Reset Password — Student Risk Prediction System</title>
    <link href="https://fonts.googleapis.com/css2family=Inter:wght@400;500;600&family=Outfit:wght@500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
    <style>
        body { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: radial-gradient(circle at top right, #1e1b4b, #0f172a); margin: 0; }
        .login-box { width: 100%; max-width: 400px; padding: 40px; background: rgba(15, 23, 42, 0.6); border: 1px solid rgba(255,255,255,0.1); border-radius: 24px; backdrop-filter: blur(20px); box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); text-align: center; }
        .login-box input, .login-box select { width: 100%; border-radius: 12px; border: 1px solid rgba(255,255,255,0.15); background: rgba(0,0,0,0.2); color: #f8fafc; padding: 12px 16px; margin-bottom: 20px; font-size: 1rem; outline: none; transition: border-color 0.2s; box-sizing: border-box; }
        .login-box input:focus, .login-box select:focus { border-color: #3b82f6; }
        .login-box button { width: 100%; padding: 12px; border-radius: 12px; font-size: 1.05rem; letter-spacing: 0.5px; height: auto; }
        .alert { background: rgba(239, 68, 68, 0.1); color: #f87171; border: 1px solid rgba(239, 68, 68, 0.3); padding: 12px; border-radius: 8px; margin-bottom: 20px; font-size: 0.9rem; }
        .success-alert { background: rgba(16, 185, 129, 0.1); color: #34d399; border: 1px solid rgba(16, 185, 129, 0.3); padding: 12px; border-radius: 8px; margin-bottom: 20px; font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="login-box">
        <h1 style="font-size: 1.8rem; margin: 0 0 10px 0;">Reset Password</h1>
        <p style="color: #94a3b8; margin: 0 0 30px 0; font-size: 0.95rem;">Enter your details to set a new password.</p>

        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            {% for category, message in messages %}
                <div class="{% if category == 'success' %}success-alert{% else %}alert{% endif %}">{{ message }}</div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form method="POST" action="/forgot_password">
            <select name="role" required>
                <option value="student">Student</option>
                <option value="teacher">Faculty / Teacher</option>
                <option value="parent">Parent</option>
            </select>
            <input type="text" name="id_num" placeholder="Your ID (USN / Teacher ID / Parent ID)" required autocomplete="off">
            <input type="text" name="name" placeholder="Your Full Name (For Verification)" required autocomplete="off">
            <input type="password" name="new_password" placeholder="New Password" required>
            <button type="submit" class="btn">Reset Password</button>
        </form>
        <p style="margin-top: 25px; color: #94a3b8; font-size: 0.9rem;">
            Remembered it <a href="/login" style="color: #3b82f6; text-decoration: none; font-weight: 500;">Sign return to login</a>
        </p>
    </div>
</body>
</html>
